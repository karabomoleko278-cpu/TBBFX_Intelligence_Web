# Active TBBFX public read-only production gateway.
# Keep this listener on loopback and publish it only through the named tunnel.

worker_processes auto;
pid logs/nginx.pid;

events {
    worker_connections 2048;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 30;
    server_tokens off;

    log_format tbbfx '$remote_addr - $request_method $uri $status '
                     '$body_bytes_sent $request_time $upstream_response_time';
    access_log logs/tbbfx-access.log tbbfx;
    error_log  logs/tbbfx-error.log warn;

    limit_req_zone $binary_remote_addr zone=tbbfx_public:10m rate=1r/s;
    limit_req_status 429;

    proxy_cache_path cache/tbbfx_macro
        levels=1:2
        keys_zone=tbbfx_macro:20m
        max_size=256m
        inactive=24h
        use_temp_path=off;

    upstream featurefactory_pool {
        least_conn;
        server 127.0.0.1:8100 max_fails=3 fail_timeout=15s;
        server 127.0.0.1:8101 max_fails=3 fail_timeout=15s;
        server 127.0.0.1:8102 max_fails=3 fail_timeout=15s;
        keepalive 32;
    }

    upstream signalr_store {
        server 127.0.0.1:5000 max_fails=3 fail_timeout=15s;
        keepalive 16;
    }

    server {
        listen 127.0.0.1:8787;
        server_name _;

        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy no-referrer always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header X-TBBFX-Gateway nginx-read-only always;
        add_header X-TBBFX-System-Mode public-read-only always;

        error_page 403 = @read_only_denied;
        error_page 429 = @rate_limited;

        if ($request_method !~ ^(GET|HEAD)$) {
            return 403;
        }

        location @read_only_denied {
            default_type application/json;
            return 403 '{"id":"gateway-read-only","results":[],"provider":"tbbfx_nginx_gateway","warnings":["PUBLIC_READ_ONLY_MONITOR rejects state-changing HTTP methods."],"extra":{"route":"gateway","system_mode":"PUBLIC READ-ONLY MONITOR","status":403}}';
        }

        location @rate_limited {
            default_type application/json;
            return 429 '{"id":"gateway-rate-limit","results":[],"provider":"tbbfx_nginx_gateway","warnings":["Public rate limit exceeded. Retry after the current window."],"extra":{"route":"gateway","status":429,"limit":"60 requests/minute/IP"}}';
        }

        location = /healthz {
            access_log off;
            default_type application/json;
            return 200 '{"status":"ok","gateway":"tbbfx-nginx","mode":"public-read-only"}';
        }

        location ~ ^/(api/(optimize|assessment|scan|history|svi|validation|live-scanner|trade|execution|relay)|features/all|features/update|hub|ws)(/|$) {
            return 403;
        }

        location ~ ^/api/macro/(validation-suite|liquidity-index|cot-positioning|yield-curve)(/|$) {
            limit_req zone=tbbfx_public burst=20 nodelay;
            proxy_pass http://featurefactory_pool;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-TBBFX-Public-Gateway 1;
            proxy_set_header Authorization "";
            proxy_set_header X-TBBFX-Key "";
            proxy_set_header X-TBBFX-Feature-Key "";
            proxy_cache tbbfx_macro;
            proxy_cache_key "$request_method$uri$is_args$args";
            proxy_cache_valid 200 12h;
            proxy_no_cache $upstream_http_set_cookie;
            add_header X-TBBFX-Cache $upstream_cache_status always;
        }

        location ~ ^/api/macro/(yield-spreads|sentiment|calendar|geopolitical-feed|geospatial-nodes|regime-state)(/|$) {
            limit_req zone=tbbfx_public burst=20 nodelay;
            proxy_pass http://featurefactory_pool;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-TBBFX-Public-Gateway 1;
            proxy_set_header Authorization "";
            proxy_set_header X-TBBFX-Key "";
            proxy_set_header X-TBBFX-Feature-Key "";
            proxy_cache tbbfx_macro;
            proxy_cache_key "$request_method$uri$is_args$args";
            proxy_cache_valid 200 5m;
            proxy_no_cache $upstream_http_set_cookie;
            add_header X-TBBFX-Cache $upstream_cache_status always;
        }

        location = /api/macro {
            limit_req zone=tbbfx_public burst=20 nodelay;
            proxy_pass http://featurefactory_pool;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-TBBFX-Public-Gateway 1;
            proxy_set_header Authorization "";
            proxy_set_header X-TBBFX-Key "";
            proxy_set_header X-TBBFX-Feature-Key "";
            proxy_hide_header Cache-Control;
            add_header Cache-Control "private, no-store" always;
            add_header CDN-Cache-Control "no-store" always;
        }

        location ~ ^/api/(momentum|exposure|greeks|volprofile)(/|$) {
            limit_req zone=tbbfx_public burst=20 nodelay;
            proxy_pass http://featurefactory_pool;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-TBBFX-Public-Gateway 1;
            proxy_set_header Authorization "";
            proxy_set_header X-TBBFX-Key "";
            proxy_set_header X-TBBFX-Feature-Key "";
            proxy_hide_header Cache-Control;
            add_header Cache-Control "private, no-store" always;
            add_header CDN-Cache-Control "no-store" always;
        }

        location ~ ^/(features/latest|api/orderflow/levels|api/market/candles)(/|$) {
            limit_req zone=tbbfx_public burst=20 nodelay;
            proxy_pass http://signalr_store;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-TBBFX-Public-Gateway 1;
            proxy_set_header Authorization "";
            proxy_set_header X-TBBFX-Key "";
            proxy_set_header X-TBBFX-Feature-Key "";
            proxy_hide_header Cache-Control;
            add_header Cache-Control "private, no-store" always;
            add_header CDN-Cache-Control "no-store" always;
        }

        location / {
            default_type application/json;
            return 404 '{"id":"gateway-not-found","results":[],"provider":"tbbfx_nginx_gateway","warnings":["Route is not exposed by the public read-only gateway."],"extra":{"route":"gateway","status":404}}';
        }
    }
}
