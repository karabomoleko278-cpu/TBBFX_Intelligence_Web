name: Deploy TBBFX Terminal to Azure Static Web Apps

on:
  push:
    branches:
      - main
    paths:
      - "terminal/**"
      - "api/**"
      - ".github/workflows/azure-static-web-apps.yml"
      - "docs/AZURE_DEPLOYMENT_SECURITY.md"
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
    paths:
      - "terminal/**"
      - "api/**"
      - ".github/workflows/azure-static-web-apps.yml"
      - "docs/AZURE_DEPLOYMENT_SECURITY.md"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: azure-static-web-apps-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and deploy static terminal
    steps:
      - uses: actions/checkout@v7

      - name: Deploy Azure Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: terminal
          api_location: api
          output_location: ""
          skip_app_build: true
          build_timeout_in_minutes: 10
        env:
          SKIP_DEPLOY_ON_MISSING_SECRETS: true

  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Azure Static Web Apps preview
    steps:
      - name: Close preview environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: close
        env:
          SKIP_DEPLOY_ON_MISSING_SECRETS: true
